name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    uses: ./.github/workflows/reusable-lint.yml
    with:
      paths: '["services/inference-api/app", "services/inference-api/tests", "services/inference-worker/worker.py"]'

  test:
    needs: lint
    uses: ./.github/workflows/reusable-test.yml
    with:
      working-directory: services/inference-api

  helm-lint:
    uses: ./.github/workflows/reusable-helm-lint.yml
    with:
      chart-path: charts/online-inference

  build-api:
    needs: test
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-build.yml
    with:
      image-name: ${{ github.repository }}/inference-api
      context: ./services/inference-api

  build-worker:
    needs: test
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/reusable-build.yml
    with:
      image-name: ${{ github.repository }}/inference-worker
      context: ./services/inference-worker

  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: [build-api, build-worker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          default_bump: patch
          release_branches: main

      - name: Tag summary
        run: |
          echo "## 🏷️ Auto Tag" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| New tag | \`${{ steps.tag.outputs.new_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous tag | \`${{ steps.tag.outputs.previous_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump type | ${{ steps.tag.outputs.release_type }} |" >> $GITHUB_STEP_SUMMARY
