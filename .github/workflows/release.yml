name: Release

on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          BASE=${LAST_TAG:-$(git rev-list --max-parents=0 HEAD)}

          cat > /tmp/release-notes.md << EOF
          # Release $VERSION

          ## What's Changed

          $CHANGELOG

          ## Metrics

          - **Commits:** $(git rev-list --count ${BASE}..HEAD)
          - **Contributors:** $(git log ${BASE}..HEAD --format='%an' | sort -u | wc -l | tr -d ' ')
          - **Files Changed:** $(git diff --name-only ${BASE}..HEAD | wc -l | tr -d ' ')

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...$VERSION
          EOF

          echo "release-notes-file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

          echo "## 📋 Release Notes Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/release-notes.md >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release-notes.outputs.release-notes-file }}
          make_latest: true

  push-versioned-images:
    name: Push versioned images (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [inference-api, inference-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## 🐳 ${{ matrix.service }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

  update-helm-values:
    name: Write image tags back to Helm values (GitOps)
    runs-on: ubuntu-latest
    needs: push-versioned-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main

      - name: Bump image tags in values.yaml
        run: |
          VERSION="${{ github.ref_name }}"
          yq e ".image.tag = \"${VERSION}\"" -i charts/online-inference/values.yaml
          yq e ".worker.image.tag = \"${VERSION}\"" -i charts/online-inference/values.yaml

      - name: Commit and push
        run: |
          VERSION="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/online-inference/values.yaml
          git commit -m "chore: bump image tags to ${VERSION} [skip ci]"
          git push origin main

      - name: GitOps summary
        run: |
          echo "## 🔄 GitOps Write-back" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Updated \`charts/online-inference/values.yaml\` image tags to \`${{ github.ref_name }}\`." >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will detect the change and sync the \`inference\` namespace." >> $GITHUB_STEP_SUMMARY
