name: Reusable Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name under the registry, e.g. org/repo/service"
        required: true
        type: string
      context:
        description: "Docker build context path"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to context"
        required: false
        type: string
        default: "Dockerfile"
      platforms:
        description: "Target platforms"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Whether to push the image"
        required: false
        type: boolean
        default: true
      extra-tags:
        description: "Additional tags (newline-separated) beyond :latest and :sha"
        required: false
        type: string
        default: ""
    outputs:
      image-ref:
        description: "Full image reference with SHA tag"
        value: ${{ jobs.build.outputs.image-ref }}

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.meta.outputs.image-ref }}
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute tags
        id: meta
        run: |
          BASE="${{ env.REGISTRY }}/${{ inputs.image-name }}"
          TAGS="${BASE}:latest
          ${BASE}:${{ github.sha }}"
          if [ -n "${{ inputs.extra-tags }}" ]; then
            while IFS= read -r tag; do
              [ -n "$tag" ] && TAGS="${TAGS}
          ${BASE}:${tag}"
            done <<< "${{ inputs.extra-tags }}"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "image-ref=${BASE}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "## 🐳 ${{ inputs.image-name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
