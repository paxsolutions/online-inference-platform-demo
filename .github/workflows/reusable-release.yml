name: Reusable Release

on:
  workflow_call:
    inputs:
      services:
        description: 'JSON array of {name, context} objects for images to build'
        required: true
        type: string
      helm-chart-path:
        description: "Path to Helm chart for GitOps write-back (empty to skip)"
        required: false
        type: string
        default: ""
      helm-values-file:
        description: "Values file to update with new image tag"
        required: false
        type: string
        default: "values.yaml"
      image-tag-paths:
        description: 'JSON array of yq paths to update, e.g. [".image.tag", ".worker.image.tag"]'
        required: false
        type: string
        default: '[".image.tag"]'
    secrets:
      PAT_TOKEN:
        description: "PAT for pushing tags and write-back commits"
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: release-notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          BASE=${LAST_TAG:-$(git rev-list --max-parents=0 HEAD)}

          cat > /tmp/release-notes.md << EOF
          # Release $VERSION

          ## What's Changed

          $CHANGELOG

          ## Metrics

          - **Commits:** $(git rev-list --count ${BASE}..HEAD)
          - **Contributors:** $(git log ${BASE}..HEAD --format='%an' | sort -u | wc -l | tr -d ' ')
          - **Files Changed:** $(git diff --name-only ${BASE}..HEAD | wc -l | tr -d ' ')

          ---

          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...$VERSION
          EOF

          echo "release-notes-file=/tmp/release-notes.md" >> $GITHUB_OUTPUT

          echo "## 📋 Release Notes Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/release-notes.md >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.release-notes.outputs.release-notes-file }}
          make_latest: true

  push-versioned-images:
    name: Push ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: ${{ fromJson(inputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "## 🐳 ${{ matrix.service.name }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}:${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

  update-helm-values:
    name: GitOps write-back
    if: ${{ inputs.helm-chart-path != '' }}
    runs-on: ubuntu-latest
    needs: push-versioned-images
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tags in values
        run: |
          VERSION="${{ github.ref_name }}"
          VALUES="${{ inputs.helm-chart-path }}/${{ inputs.helm-values-file }}"
          PATHS=$(echo '${{ inputs.image-tag-paths }}' | jq -r '.[]')
          for yqpath in $PATHS; do
            yq e "${yqpath} = \"${VERSION}\"" -i "$VALUES"
          done

      - name: Commit and push
        run: |
          VERSION="${{ github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.helm-chart-path }}/${{ inputs.helm-values-file }}"
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump image tags to ${VERSION} [skip ci]"
          git push origin main

      - name: GitOps summary
        run: |
          echo "## 🔄 GitOps Write-back" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Updated \`${{ inputs.helm-chart-path }}/${{ inputs.helm-values-file }}\` image tags to \`${{ github.ref_name }}\`." >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD will detect the change and sync automatically." >> $GITHUB_STEP_SUMMARY
