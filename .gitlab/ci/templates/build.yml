# ---------------------------------------------------------------------------
# Reusable Docker build & push template
# Usage:
#   build-api:
#     extends: .docker-build
#     variables:
#       IMAGE_NAME: "inference-api"
#       DOCKER_CONTEXT: "./services/inference-api"
# ---------------------------------------------------------------------------

.docker-build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_NAME: ""
    DOCKER_CONTEXT: "."
    DOCKERFILE: "Dockerfile"
    # REGISTRY and REGISTRY_IMAGE are set in the main pipeline
  before_script:
    - docker login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  script:
    - |
      FULL_IMAGE="${CI_REGISTRY_IMAGE}/${IMAGE_NAME}"
      docker build \
        --file "${DOCKER_CONTEXT}/${DOCKERFILE}" \
        --tag "${FULL_IMAGE}:latest" \
        --tag "${FULL_IMAGE}:${CI_COMMIT_SHORT_SHA}" \
        --tag "${FULL_IMAGE}:${CI_COMMIT_REF_SLUG}" \
        "${DOCKER_CONTEXT}"

      docker push "${FULL_IMAGE}:latest"
      docker push "${FULL_IMAGE}:${CI_COMMIT_SHORT_SHA}"
      docker push "${FULL_IMAGE}:${CI_COMMIT_REF_SLUG}"

      echo "IMAGE_REF=${FULL_IMAGE}:${CI_COMMIT_SHORT_SHA}" >> build.env
  artifacts:
    reports:
      dotenv: build.env
