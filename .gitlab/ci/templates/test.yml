# ---------------------------------------------------------------------------
# Reusable test template
# Usage:
#   test:
#     extends: .test
#     variables:
#       WORKING_DIRECTORY: "services/my-api"
# ---------------------------------------------------------------------------

.test:
  stage: test
  image: python:${PYTHON_VERSION}
  before_script:
    - cd ${CI_PROJECT_DIR}/services/inference-api
    - ls -la
    - pip install --quiet -r requirements.txt
  script:
    - pytest tests/ -v --junit-xml=report.xml
  artifacts:
    when: always
    reports:
      junit: "${CI_PROJECT_DIR}/services/inference-api/report.xml"
    expire_in: 30 days
