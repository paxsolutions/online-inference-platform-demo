# ---------------------------------------------------------------------------
# Reusable test template
# Usage:
#   test:
#     extends: .test
#     variables:
#       WORKING_DIRECTORY: "services/my-api"
# ---------------------------------------------------------------------------

.test:
  stage: test
  image: python:${PYTHON_VERSION}
  variables:
    WORKING_DIRECTORY: "services/inference-api"
    REQUIREMENTS_FILE: "requirements.txt"
    TEST_COMMAND: "pytest tests/ -v --junit-xml=report.xml"
  before_script:
    - apt-get update -qq && apt-get install -y -qq build-essential
    - cd "${CI_PROJECT_DIR}/${WORKING_DIRECTORY}"
    - pip install --quiet -r "${REQUIREMENTS_FILE}"
  script:
    - ${TEST_COMMAND}
  artifacts:
    when: always
    reports:
      junit: "${CI_PROJECT_DIR}/${WORKING_DIRECTORY}/report.xml"
    expire_in: 30 days
