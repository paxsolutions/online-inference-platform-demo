{{- if .Values.rollout.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "online-inference.fullname" . }}-success-rate
  labels: {{- include "online-inference.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      successCondition: result[0] >= {{ .Values.rollout.analysis.successThreshold }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      provider:
        prometheus:
          address: http://prometheus:{{ .Values.prometheus.service.port }}
          query: |
            sum(rate(inference_requests_total{status="200"}[2m]))
            /
            sum(rate(inference_requests_total[2m]))
    - name: latency-p95
      interval: {{ .Values.rollout.analysis.interval }}
      count: {{ .Values.rollout.analysis.count }}
      successCondition: result[0] <= {{ .Values.rollout.analysis.maxLatencyMs }}
      failureLimit: {{ .Values.rollout.analysis.failureLimit }}
      provider:
        prometheus:
          address: http://prometheus:{{ .Values.prometheus.service.port }}
          query: |
            histogram_quantile(0.95,
              rate(inference_request_latency_seconds_bucket[2m])
            ) * 1000
{{- end }}
