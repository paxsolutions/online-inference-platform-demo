{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://{{ .Values.prometheus.service.name }}:{{ .Values.prometheus.service.port }}
        access: proxy
        isDefault: true
        editable: false
      - name: Jaeger
        type: jaeger
        uid: jaeger
        url: http://jaeger:16686
        access: proxy
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-inference
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  inference.json: |
    {
      "title": "Online Inference Platform",
      "uid": "inference-overview",
      "schemaVersion": 38,
      "refresh": "5s",
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "rate(inference_requests_total[1m])",
            "legendFormat": "{{ "{{" }}status{{ "}}" }}"
          }]
        },
        {
          "id": 2,
          "title": "P95 Latency (ms)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "histogram_quantile(0.95, rate(inference_request_latency_seconds_bucket[1m])) * 1000",
            "legendFormat": "p95 latency"
          }]
        },
        {
          "id": 3,
          "title": "Cache Hit Rate",
          "type": "timeseries",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(rate(inference_request_latency_seconds_count{endpoint=\"/infer\",cache_hit=\"true\"}[1m])) / sum(rate(inference_request_latency_seconds_count{endpoint=\"/infer\"}[1m]))",
            "legendFormat": "hit rate",
            "refId": "A"
          }],
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "unit": "percentunit",
            "legend": {"calcs": ["mean", "lastNotNull"], "displayMode": "table", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "single", "sort": "none"}
          }
        },
        {
          "id": 4,
          "title": "Jobs Enqueued (rate/s)",
          "type": "timeseries",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "rate(inference_jobs_enqueued_total[1m])",
            "legendFormat": "enqueue rate"
          }]
        },
        {
          "id": 5,
          "title": "Worker Job Processing P95 (ms)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "histogram_quantile(0.95, rate(inference_job_processing_seconds_bucket[5m])) * 1000",
            "legendFormat": "p95 processing"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "id": 6,
          "title": "Process CPU (seconds/s)",
          "type": "timeseries",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "rate(process_cpu_seconds_total{job=~\"inference-api|inference-worker\"}[1m])",
            "legendFormat": "{{ "{{" }}job{{ "}}" }}"
          }]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:{{ .Values.grafana.version }}
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "traceqlEditor"
            - name: GF_SERVER_HTTP_PORT
              value: "3006"
          ports:
            - containerPort: 3006
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-inference
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  selector:
    app: grafana
  ports:
    - port: 3006
      targetPort: 3006
{{- end }}
