{{- if .Values.worker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.worker.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: {{ .Values.worker.name }}
  ports:
    - port: {{ .Values.worker.env.METRICS_PORT | int }}
      targetPort: {{ .Values.worker.env.METRICS_PORT | int }}
{{- end }}
