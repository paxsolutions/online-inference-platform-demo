# Placeholder for GHCR pull secret
# After creating the secret below, you can export it to Git if needed via:
# kubectl -n inference-flux get secret ghcr-pull-secret -o yaml > deploy/flux/config/secret-export.yaml
# (be careful with secrets in Git - use sealed-secrets or external-secrets for production)
#
# Create the secret manually:
# kubectl -n inference-flux create secret docker-registry ghcr-pull-secret \
#   --docker-server=ghcr.io \
#   --docker-username=<github-username> \
#   --docker-password=<ghcr-pat>
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: inference-flux
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ""
