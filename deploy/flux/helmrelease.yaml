---
# HelmRelease deploys the chart using Flux's native Helm controller
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: online-inference-flux
  namespace: flux-system
spec:
  interval: 5m
  releaseName: online-inference-flux
  targetNamespace: inference-flux
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./charts/online-inference
      sourceRef:
        kind: GitRepository
        name: online-inference
        namespace: flux-system
      interval: 1m
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/paxsolutions/online-inference-platform-demo/inference-api
      tag: v0.3.3
      pullPolicy: IfNotPresent
    imagePullSecrets:
      - name: ghcr-pull-secret
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 60
      targetMemoryUtilizationPercentage: 75
    redis:
      enabled: true
      image: redis:7-alpine
      host: redis
      port: 6379
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi
