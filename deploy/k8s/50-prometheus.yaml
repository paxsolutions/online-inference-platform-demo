apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: inference
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: "inference-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["inference-api.inference.svc.cluster.local:80"]
      - job_name: "inference-worker"
        metrics_path: /metrics
        static_configs:
          - targets: ["inference-worker.inference.svc.cluster.local:9100"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.0
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: cfg
              mountPath: /etc/prometheus
      volumes:
        - name: cfg
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: inference
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
