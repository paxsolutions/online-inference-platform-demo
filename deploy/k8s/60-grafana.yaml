apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: inference
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: inference
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: inference
data:
  inference-dashboard.json: |
    {
      "title": "Inference API",
      "timezone": "browser",
      "panels": [
        {
          "type": "timeseries",
          "title": "Requests / sec",
          "targets": [
            { "expr": "sum(rate(inference_requests_total[1m]))", "legendFormat": "rps" }
          ],
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 8 }
        },
        {
          "type": "timeseries",
          "title": "Latency (p95 approx)",
          "targets": [
            { "expr": "histogram_quantile(0.95, sum(rate(inference_request_latency_seconds_bucket[1m])) by (le))", "legendFormat": "p95" }
          ],
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 }
        }
      ],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: ds
              mountPath: /etc/grafana/provisioning/datasources
            - name: prov
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dash
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: ds
          configMap:
            name: grafana-datasources
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: prov
          configMap:
            name: grafana-dashboards
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dash
          configMap:
            name: grafana-dashboard-json
            items:
              - key: inference-dashboard.json
                path: inference-dashboard.json
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: inference
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
