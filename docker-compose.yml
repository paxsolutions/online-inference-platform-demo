services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector:0.104.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318" # OTLP HTTP

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686" # UI
      - "14250:14250" # gRPC ingest (collector uses this)

  inference-api:
    build:
      context: ./services/inference-api
    environment:
      APP_NAME: inference-api
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "60"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - redis
      - otel-collector
    ports:
      - "8080:8080"

  inference-worker:
    build:
      context: ./services/inference-worker
    environment:
      APP_NAME: inference-worker
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: inference:queue
      RESULT_TTL_SECONDS: "600"
      METRICS_PORT: "9100"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
    depends_on:
      - redis
      - otel-collector
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - inference-api

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
