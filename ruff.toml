line-length = 120
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
]
ignore = [
    "S101",  # assert used — fine in tests
    "S105",  # hardcoded passwords — false positives on config defaults (e.g. admin/admin)
    "S311",  # pseudo-random generators — not used for security here
]

[lint.per-file-ignores]
"services/inference-api/tests/*" = [
    "S",   # bandit rules — tests intentionally use assert, mock creds, etc.
]
